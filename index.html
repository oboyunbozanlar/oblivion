<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLİVİON | Dashboard</title>
    <style>
        /* CSS Başlangıcı */
        body { background-color: #16161f; color: #a9a9bc; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; }

        /* Sidebar */
        .sidebar { width: 280px; height: 100vh; background: #20202d; padding: 20px; border-right: 1px solid #2d2d40; position: fixed; z-index: 100; }
        .user-profile { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; }
        .user-profile img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #5a5a7d; }
        .user-info h3 { margin: 0; color: #fff; font-size: 1.1rem; }
        .status { color: #00ff88; font-size: 0.75rem; }

        /* Nav */
        .nav-links a { display: block; color: #a9a9bc; text-decoration: none; padding: 15px 0; border-bottom: 1px solid #2d2d40; transition: 0.3s; }
        .nav-links a:hover { color: #fff; padding-left: 5px; }
        .nav-links h4 { color: #5a5a7d; margin-top: 30px; font-size: 0.7rem; text-transform: uppercase; }

        /* Content */
        .main-content { margin-left: 320px; padding: 40px; width: 100%; }
        .card { background: #20202d; padding: 20px; border-radius: 10px; border: 1px solid #2d2d40; margin-bottom: 20px; }
        .card h3 { color: #fff; margin-top: 0; }
        button { background: transparent; border: 1px solid #00f2ff; color: #00f2ff; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00f2ff; color: #16161f; }
        
        .menu-btn { display: none; background: none; border: none; color: #fff; font-size: 25px; cursor: pointer; position: fixed; top: 15px; left: 15px; z-index: 101; }

        @media (max-width: 768px) {
            .sidebar { left: -280px; transition: 0.3s; }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; padding: 60px 20px; }
            .menu-btn { display: block; }
        }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰</button>

    <aside id="sidebar" class="sidebar">
        <div class="user-profile">
            <img src="profil.jpg" alt="Profile">
            <div class="user-info">
                <h3>mamut2714</h3>
                <p>Normal Üye</p>
                <span class="status">● Çevrimiçi</span>
            </div>
        </div>

        <nav class="nav-links">
            <a href="#">Ana Sayfa</a>
            <a href="#">Destek Talebi Oluştur</a>
            <hr>
            <h4>Kategoriler</h4>
            <a href="#scripts">PY Scriptleri</a>
            <a href="#maps">Roblox Mapler</a>
            <a href="#">İletişim</a>
        </nav>
    </aside>

    <main class="main-content">
        <h1>OBLİVİON PANEL</h1>
        <div class="card" id="scripts">
            <h3>KALP GÖRSEN ŞÖLEN</h3>
            <p>Gelişmiş görsel efektli script.</p>
            <button onclick="fetchGitHubScript('https://raw.githubusercontent.com/oboyunbozanlar/oblivion/main/kalp.py')">Kopyala</button>
        </div>
    </main>

    <script>
        // Menü Toggle Fonksiyonu
        function toggleMenu() {
            document.getElementById("sidebar").classList.toggle("active");
        }
        
        // GitHub'dan Kod Çekme Fonksiyonu
        async function fetchGitHubScript(url) {
            try {
                const response = await fetch(url);
                const code = await response.text();
                navigator.clipboard.writeText(code);
                alert("Script panoya kopyalandı!");
            } catch (error) {
                alert("Hata: Script yüklenemedi.");
            }
        }
    </script>
</body>
</html>
