<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBLİVİON | Elite Ops</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');

        :root {
            --bg: #0a0a0c;
            --panel: #121217;
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Outfit', sans-serif; margin: 0; display: flex;
        }

        /* Sidebar - Premium Dokunuş */
        .sidebar { 
            width: 320px; height: 100vh; background: var(--panel); 
            border-right: 1px solid rgba(255,255,255,0.05); padding: 50px 30px;
            position: fixed; display: flex; flex-direction: column; align-items: center;
        }

        .profile-img { 
            width: 120px; height: 120px; border-radius: 20px; 
            object-fit: cover; border: 1px solid var(--accent);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2); margin-bottom: 20px;
        }

        .nav-links { width: 100%; margin-top: 50px; }
        .nav-links a { 
            display: block; color: #777; text-decoration: none; padding: 20px;
            border-radius: 12px; transition: 0.4s; font-weight: 600;
        }
        .nav-links a:hover { 
            background: var(--glass); color: var(--accent); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Ana İçerik */
        .main-content { margin-left: 380px; padding: 80px; width: 100%; }
        
        .header-section { margin-bottom: 60px; }
        .header-section h1 { font-size: 3.5rem; letter-spacing: -1px; margin: 0; }

        /* Premium Kart */
        .card { 
            background: var(--panel); padding: 40px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden;
            transition: 0.5s; width: 400px;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-10px); }
        
        /* Modern Buton */
        button { 
            background: var(--accent); color: #000; border: none;
            padding: 15px 30px; border-radius: 12px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }
        button:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(0, 242, 255, 0.4); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <img src="profil.jpg" class="profile-img" alt="User">
        <h2 style="margin:0">mamut2714</h2>
        <p style="color:var(--accent); font-size: 0.8rem;">SİSTEM ÇEVRİMİÇİ</p>
        
        <nav class="nav-links">
            <a href="#">Dashboard</a>
            <a href="#">Script Deposu</a>
            <a href="#">İletişim</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="header-section">
            <h1>OBLİVİON <span style="color:var(--accent)">HUB</span></h1>
            <p style="color:#777">Profesyonel dijital operasyon merkezi.</p>
        </div>

        <div class="card">
            <h3>KALP GÖRSEN ŞÖLEN</h3>
            <p style="color:#aaa">Gelişmiş görsel efektli modül.</p>
            <button onclick="alert('Kopyalandı!')">KODU KOPYALA</button>
        </div>
    </main>
</body>
</html>
